# llama-swap config — one OpenAI-compatible endpoint on :8080,
# swaps the right llama-server per requested model name.
# llama.cpp build b9616 (CUDA 13.3), llama-swap v224.
#
# TEMPLATE: __DOKI_ROOT__ is substituted with the repo root at launch by start-serving.ps1
# (which emits .run\llama-swap.generated.yaml and points llama-swap at that). This keeps the
# absolute paths llama-server needs correct across a project move. Do NOT run this file directly;
# llama-swap does not expand ${ENV} vars inside cmd, so the substitution is done in PowerShell.

healthCheckTimeout: 900   # coder-big pages ~60GB from disk on first load
logLevel: info

models:
  # Model A — daily driver, fully on GPU.
  # Weights ~17.7GB (UD-Q4_K_XL) + ~6.4GB KV (q8, 128k) + overhead ≈ ~26GB VRAM.
  "coder-fast":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
      --port ${PORT}
      -ngl 99
      -c 131072
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-reuse 256
      --jinja

  # Model A-lite — coder-fast at 64k ctx for running ALONGSIDE the FIM
  # autocomplete server (:8012, ~6.6GB). ~17.7GB weights + ~3GB KV ≈ ~21GB,
  # so FIM + this ≈ ~28GB < 32GB. Point the harness here when editing with
  # llama.vscode live. Full 128k coder-fast cannot coexist with FIM.
  "coder-fast-lite":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
      --port ${PORT}
      -ngl 99
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-reuse 256
      --jinja

  # Model B — heavy hitter. gpt-oss-120b (5.1B active), experts of the first
  # 24 layers (of 36) kept in system RAM. GPU ≈ ~27GB, RAM ≈ ~40GB.
  # Tune --n-cpu-moe DOWN (more experts on GPU = faster) until VRAM ~30GB.
  "coder-big":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\gpt-oss-120b-mxfp4-00001-of-00003.gguf
      --port ${PORT}
      -ngl 99
      --n-cpu-moe 22
      -c 131072
      -b 2048
      -ub 2048
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-reuse 256
      --jinja
