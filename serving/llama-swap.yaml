# llama-swap config — one OpenAI-compatible endpoint on :8080,
# swaps the right llama-server per requested model name.
# llama.cpp build b9616 (CUDA 13.3), llama-swap v224.
#
# TEMPLATE: __DOKI_ROOT__ is substituted with the repo root at launch by start-serving.ps1
# (which emits .run\llama-swap.generated.yaml and points llama-swap at that). This keeps the
# absolute paths llama-server needs correct across a project move. Do NOT run this file directly;
# llama-swap does not expand ${ENV} vars inside cmd, so the substitution is done in PowerShell.

healthCheckTimeout: 900   # coder-big pages ~60GB from disk on first load
logLevel: info

models:
  # Model A — daily driver, fully on GPU.
  # Weights ~17.7GB (UD-Q4_K_XL) + ~6.4GB KV (q8, 128k) + overhead ≈ ~26GB VRAM.
  "coder-fast":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
      --port ${PORT}
      -ngl 99
      -c 131072
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-reuse 256
      --jinja

  # Model A-lite — coder-fast at 64k ctx for running ALONGSIDE the FIM
  # autocomplete server (:8012, ~6.6GB). ~17.7GB weights + ~3GB KV ≈ ~21GB,
  # so FIM + this ≈ ~28GB < 32GB. Point the harness here when editing with
  # llama.vscode live. Full 128k coder-fast cannot coexist with FIM.
  "coder-fast-lite":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
      --port ${PORT}
      -ngl 99
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-reuse 256
      --jinja

  # Model B — heavy hitter. gpt-oss-120b (5.1B active), experts of the first
  # 24 layers (of 36) kept in system RAM. GPU ≈ ~27GB, RAM ≈ ~40GB.
  # Tune --n-cpu-moe DOWN (more experts on GPU = faster) until VRAM ~30GB.
  "coder-big":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\gpt-oss-120b-mxfp4-00001-of-00003.gguf
      --port ${PORT}
      -ngl 99
      --n-cpu-moe 22
      -c 131072
      -b 2048
      -ub 2048
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-reuse 256
      --jinja

  # Model V — VISION (gated). Lights up the studio's Describe (image->prompt) and Verify
  # (output-adherence) surfaces; the in-app code posts OpenAI image_url to :8080 asking for model
  # "vision" (LlmTiers.Vision). PROMOTED 2026-06-21 from the 8B to Qwen3-VL-32B-Instruct — eval-gated:
  # the 32B reads fine UI text/telemetry the 8B cannot (docs/decisions.md). Q4_K_M ~18.4GiB + mmproj
  # ~1.1GiB + q8 KV @32k fits 32GB (Q8_0 32.4GiB does NOT). --mmproj REQUIRED (Qwen3-VL CLIP via
  # llama.cpp PR #16780, in this b9616 build). Use the INSTRUCT (not Thinking) variant. ~15s cold swap,
  # ~2-4s/describe warm. The 8B is kept as "vision-8b" below (sub-second warm) for high-volume vision.
  "vision":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\Qwen3-VL-32B-Instruct-Q4_K_M.gguf
      --mmproj __DOKI_ROOT__\models\Qwen3-VL-32B-Instruct-mmproj-F16.gguf
      --port ${PORT}
      -ngl 99
      -c 32768
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --jinja

  # Fast fallback vision tier — Qwen3-VL-8B (~7GB, sub-second warm). Request "vision-8b" for
  # high-volume / interactive vision where the 32B's extra accuracy isn't needed.
  # AUDIT quick-win #11 (2026-07-01): added --cache-type-k/v q8_0 to match the "vision" tier above
  # and reclaim ~1.6GB VRAM. --cache-reuse deliberately NOT added here, for consistency with
  # "vision" (which also omits it): vision prompts carry per-request image tokens, so the
  # text-prefix-reuse win that justifies --cache-reuse 256 on the text-only coder-* tiers is
  # marginal for this tier. Config-only change; VRAM/latency not re-verified live (GPU-gated).
  "vision-8b":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\Qwen3-VL-8B-Instruct-Q4_K_M.gguf
      --mmproj __DOKI_ROOT__\models\Qwen3-VL-8B-mmproj-F16.gguf
      --port ${PORT}
      -ngl 99
      -c 16384
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --jinja

  # ---- Bake-off candidates (COMMENTED OUT; the field moved since the last refresh — see docs/decisions.md).
  # Download with `setup.ps1 -LlmCandidates`, uncomment one, then gate it through serving\test-toolcall.ps1 +
  # evals\run-suite.ps1 BEFORE making it a tier model (>=91% golden AND zero tool-call flakes). Run text-only
  # with /no_think — the Qwen3.6 models are multimodal + thinking-by-default; mmproj omitted on purpose.
  #
  # Devstral-Small-2-24B-2512 (Apache 2.0) — TOP Mistral pick (docs/mistral-2026-06.md). PURPOSE-BUILT for the
  # `doki code` agentic Read/Grep/Edit/Write/Bash loop (co-built w/ OpenHands); SWE-bench 68% [vendor] vs
  # Qwen3-Coder ~50%, smaller VRAM, 256K ctx. GGUF: bartowski Q4_K_M 14.3GB — url+sha256 human-verified (G1,
  # catalog id "candidate-devstral") and re-verified at download 2026-07-01. ENABLED for the three-way bake-off.
  # Run: `doki code --model coder-candidate-devstral`.
  "coder-candidate-devstral":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\Devstral-Small-2-24B-Instruct-2512-Q4_K_M.gguf
      --port ${PORT} -ngl 99 -c 131072 --flash-attn on --cache-type-k q8_0 --cache-type-v q8_0 --cache-reuse 256 --jinja
  #
  # "coder-candidate":            # Qwen3.6-27B dense (lead — dense tool-calls historically steadier)
  #   cmd: |
  #     __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
  #     -m __DOKI_ROOT__\models\Qwen3.6-27B-UD-Q4_K_XL.gguf
  #     --port ${PORT} -ngl 99 -c 131072 --flash-attn on --cache-type-k q8_0 --cache-type-v q8_0 --cache-reuse 256 --jinja
  #
  # Qwen3.6-35B-A3B (Apache 2.0) — bake-off candidate #2 (keeps the 3B-active speed; "mixed tool-call" reports —
  # measure). UD-Q4_K_XL 22.4GB, sha256 human-verified (G1, catalog id "candidate-a3b") and re-verified at
  # download 2026-07-01. Thinking-by-default family — text-only role here (mmproj omitted on purpose).
  # ENABLED for the three-way bake-off.
  "coder-candidate-a3b":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
      --port ${PORT} -ngl 99 -c 131072 --flash-attn on --cache-type-k q8_0 --cache-type-v q8_0 --cache-reuse 256 --jinja
  #
  # "heavy-candidate":            # Qwen3-Coder-Next-80B-A3B (FULL 80B, NOT the rejected REAP-48B prune) vs gpt-oss-120b
  #   cmd: |
  #     __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
  #     -m __DOKI_ROOT__\models\Qwen3-Coder-Next-80B-A3B-Q4_K_XL.gguf
  #     --port ${PORT} -ngl 99 --n-cpu-moe 18 -c 131072 -b 2048 -ub 2048 --flash-attn on --cache-type-k q8_0 --cache-type-v q8_0 --cache-reuse 256 --jinja
  #
  # "coder-candidate-glm":        # GLM-4.7-Flash (30B-A3B, MIT). Runtime arch = deepseek2/MLA (Glm4MoeLiteForCausalLM) — NOT glm4moe.
  #                               # ~17.5GB UD-Q4_K_XL, full-GPU (no offload); same class as coder-fast. Thinking-by-default:
  #                               # send /no_think to match coder-fast's non-thinking, low-TTFT role.
  #                               # KV-quant OFF on purpose (no --cache-type / --cache-reuse): OPEN llama.cpp #21915 makes GLM
  #                               # emit gibberish on the 2nd+ turn with q8_0 KV. Re-test KV-quant as a separate bake-off variable.
  #   cmd: |
  #     __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
  #     -m __DOKI_ROOT__\models\GLM-4.7-Flash-UD-Q4_K_XL.gguf
  #     --port ${PORT} -ngl 99 -c 131072 --flash-attn on --repeat-penalty 1.0 --min-p 0.01 --jinja
  #
  # gpt-oss-20b (MXFP4, ggml-org/gpt-oss-20b-GGUF). Fits FULLY on-GPU (~17.9GB @131k, no --n-cpu-moe) — a fast
  # general option between coder-fast (30B) and the offloaded coder-big (120b). F16 KV on purpose (q8_0 KV hurts
  # gpt-oss). TOOL-CALL GATE PASSED 2026-06-21 (4/4, zero flakes, ~359 tok/s) + 3/3 direct coding probes -> kept
  # as an on-demand tier (request "fast-candidate-gptoss20b"). The >=91% golden half is unmeasured (needs the
  # candidate registered in the crush harness); coder-fast (30B coder) stays the coding default. NB: gpt-oss puts
  # chain-of-thought in reasoning_content — give it a normal max_tokens or the visible content can come back empty.
  "fast-candidate-gptoss20b":
    cmd: |
      __DOKI_ROOT__\serving\llama.cpp\llama-server.exe
      -m __DOKI_ROOT__\models\gpt-oss-20b-mxfp4.gguf
      --port ${PORT}
      -ngl 99
      -c 131072
      --flash-attn on
      --jinja

  # (Qwen3-VL-32B-Instruct was PROMOTED to the "vision" tier above on 2026-06-21 after the eval-gate
  #  — it decisively out-read the 8B on fine UI text/telemetry. Its standalone "vision-candidate-32b"
  #  bake-off entry was removed as redundant; the 8B remains available as "vision-8b".)
