<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DokiDex Studio</title>
  <style>
    :root {
      --bg:#0A0E14; --surface:#0D121B; --surface2:#121826; --surface3:#1B2433; --border:#243140;
      --text:#E6EEF6; --dim:#7E8C99; --cyan:#35E0F0; --gold:#E8C77A; --danger:#FF6B6B;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:"Segoe UI Variable Display","Segoe UI",system-ui,sans-serif; }
    header { display:flex; align-items:center; gap:18px; padding:14px 28px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:5; }
    .brand { font-weight:300; letter-spacing:3px; font-size:17px; }
    .brand b { color:var(--gold); font-weight:600; letter-spacing:1px; }
    nav { display:flex; gap:6px; margin-left:6px; }
    nav button { background:none; border:0; color:var(--dim); font-size:13px; padding:6px 12px; cursor:pointer; border-radius:5px; }
    nav button.on { color:var(--text); background:var(--surface2); }
    .gpu-pill { margin-left:auto; font-family:"Cascadia Mono",Consolas,monospace; font-size:11px; color:var(--dim); }
    .gpu-pill b { color:var(--cyan); }
    main { padding:22px 28px; max-width:1080px; margin:0 auto; }
    .banner { background:#1a1606; border:1px solid #5a4a16; color:var(--gold); border-radius:8px; padding:12px 14px; margin-bottom:18px; display:flex; align-items:center; gap:14px; font-size:13px; }
    .banner button { margin-left:auto; }
    textarea { width:100%; min-height:84px; resize:vertical; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-size:15px; font-family:inherit; }
    textarea:focus { outline:none; border-color:#80E8C77A; }
    .pills { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
    .pill { background:var(--surface2); border:1px solid var(--border); color:var(--dim); border-radius:999px; padding:6px 14px; font-size:12px; cursor:pointer; }
    .pill.on { color:#06121a; background:var(--cyan); border-color:var(--cyan); font-weight:600; }
    .mods { display:flex; gap:14px; flex-wrap:wrap; margin:8px 0 14px; color:var(--dim); font-size:12px; }
    .mods label { cursor:pointer; user-select:none; }
    .row { display:flex; align-items:center; gap:12px; }
    button.primary { background:#0E7490; color:var(--text); border:1px solid #0E7490; border-radius:6px; padding:10px 22px; font-size:14px; cursor:pointer; }
    button.primary:hover { background:#1190b0; }
    button.ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:8px 14px; font-size:13px; cursor:pointer; }
    .hint { color:var(--dim); font-size:12px; }
    h2 { font-size:11px; letter-spacing:1px; color:var(--dim); font-weight:600; text-transform:uppercase; margin:24px 0 10px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
    .card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .card .media { aspect-ratio:1; background:var(--bg); display:flex; align-items:center; justify-content:center; }
    .card .media img, .card .media video { width:100%; height:100%; object-fit:contain; }
    .card .body { padding:10px 12px; }
    .card .p { font-size:12px; color:var(--text); overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .card .s { font-size:11px; font-family:"Cascadia Mono",Consolas,monospace; margin-top:6px; }
    .s.running { color:var(--cyan); } .s.failed { color:var(--danger); } .s.queued { color:var(--dim); } .s.done { color:var(--gold); }
    .spinner { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin 0.9s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .pbar { height:3px; background:var(--bg); } .pbar > div { height:100%; background:var(--cyan); transition:width .3s; }
    .xbtn { background:none; border:1px solid var(--border); color:var(--dim); border-radius:4px; font-size:10px; padding:2px 8px; cursor:pointer; }
    .xbtn:hover { color:var(--danger); border-color:var(--danger); }
    .kin { width:90px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:3px 6px; }
    /* status view */
    .scards { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
    .scard { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
    .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:7px; }
    .ok{background:var(--cyan)} .warn{background:var(--gold)} .off{background:#3a4452} .bad{background:var(--danger)}
    .modes{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
    .mode{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--dim);padding:10px 16px;cursor:pointer;min-width:120px;text-align:left}
    .mode.active{border-left:2px solid var(--cyan);color:var(--text);background:var(--surface)}
    .mode small{display:block;color:var(--dim);font-size:10px;margin-top:2px}
  </style>
</head>
<body>
  <header>
    <span class="brand">D O K I <b>DEX</b></span>
    <nav>
      <button id="nav-create" class="on" onclick="setView('create')">Create</button>
      <button id="nav-library" onclick="setView('library')">Library</button>
      <button id="nav-models" onclick="setView('models')">Models</button>
      <button id="nav-status" onclick="setView('status')">Status</button>
    </nav>
    <span id="gpuPill" class="gpu-pill"></span>
  </header>
  <main>
    <section id="view-create">
      <div id="guard"></div>
      <textarea id="prompt" placeholder="Describe what to generate…  (Ctrl+Enter to generate)"></textarea>
      <div class="pills" id="kinds"></div>
      <div class="mods" id="mods"></div>
      <div class="mods">
        <label>Seed <input id="seed" type="number" placeholder="random" class="kin"></label>
        <label>Count <input id="count" type="number" value="1" min="1" max="9" class="kin" style="width:54px"></label>
        <label>Aspect <select id="aspect" class="kin" style="width:auto"><option value="">1:1</option><option>16:9</option><option>9:16</option><option>4:3</option><option>3:4</option></select></label>
        <label class="xbtn" style="cursor:pointer">+ init image<input id="initfile" type="file" accept="image/*" style="display:none"></label>
        <span id="initname" class="hint" style="cursor:pointer"></span>
      </div>
      <div id="maskbox" style="display:none;margin:4px 0 12px">
        <div class="hint" style="margin-bottom:4px">Edit canvas — paint the area to change, then Generate:</div>
        <div style="position:relative;display:inline-block;border:1px solid var(--border);border-radius:6px;overflow:hidden">
          <img id="maskimg" style="display:block;max-width:512px"/>
          <canvas id="maskcanvas" style="position:absolute;left:0;top:0;cursor:crosshair;opacity:0.5"></canvas>
        </div>
        <div style="margin-top:4px"><button class="xbtn" onclick="clearMask()">clear mask</button></div>
      </div>
      <div class="row">
        <button class="primary" id="genBtn" onclick="generate()">Generate</button>
        <span class="hint" id="genHint"></span>
      </div>
      <h2>Results</h2>
      <div class="grid" id="results"><p class="hint">Nothing generated yet.</p></div>
    </section>
    <section id="view-status" style="display:none">
      <div class="modes" id="modes"></div>
      <div id="statusBody"></div>
    </section>
    <section id="view-library" style="display:none">
      <h2>Library</h2>
      <div class="grid" id="library"><p class="hint">Loading…</p></div>
    </section>
    <section id="view-models" style="display:none">
      <div id="models"><p class="hint">Loading…</p></div>
    </section>
  </main>
  <script>
    const $ = (h) => { const d=document.createElement('div'); d.innerHTML=h; return d.firstElementChild; };
    const esc = (s) => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const KINDS = ['image','video','music','edit','i2v','foley'];
    const MODS = [['fast','Fast'],['refine','Refine'],['face','Face'],['realism','Realism'],['upscale','Upscale']];
    const VIDEO = new Set(['video','i2v','foley']);
    let state = { view:'create', kind:'image', mods:{}, mediaActive:false, initImage:null };

    function setView(v){ state.view=v;
      for (const x of ['create','status','library','models']) {
        document.getElementById('view-'+x).style.display = v===x?'':'none';
        document.getElementById('nav-'+x).className = v===x?'on':'';
      }
      if (v==='library') loadLibrary();
      if (v==='models') loadModels();
    }
    function renderControls(){
      const k = document.getElementById('kinds'); k.innerHTML='';
      KINDS.forEach(kind => { const b=$(`<button class="pill ${state.kind===kind?'on':''}">${kind}</button>`); b.onclick=()=>{state.kind=kind; renderControls();}; k.appendChild(b); });
      const m = document.getElementById('mods'); m.innerHTML='';
      MODS.forEach(([id,label]) => { const l=$(`<label><input type="checkbox" ${state.mods[id]?'checked':''}/> ${label}</label>`); l.querySelector('input').onchange=(e)=>state.mods[id]=e.target.checked; m.appendChild(l); });
      updateMaskBox();
    }
    let _maskDrawn=false, _maskDrawing=false;
    function updateMaskBox(){
      const show = state.kind==='edit' && !!state.initImage;
      document.getElementById('maskbox').style.display = show ? '' : 'none';
      if (show) setupMask();
    }
    function setupMask(){
      const img=document.getElementById('maskimg'), cv=document.getElementById('maskcanvas');
      img.onload = () => { cv.width=img.clientWidth; cv.height=img.clientHeight; clearMask(); };
      if (img.src !== state.initImage) img.src = state.initImage; else if (img.complete) { cv.width=img.clientWidth; cv.height=img.clientHeight; }
    }
    function clearMask(){ const cv=document.getElementById('maskcanvas'); const x=cv.getContext('2d'); x.fillStyle='#000'; x.fillRect(0,0,cv.width,cv.height); _maskDrawn=false; }
    async function generate(){
      const prompt = document.getElementById('prompt').value.trim();
      const hint = document.getElementById('genHint');
      if(!prompt){ hint.textContent='enter a prompt first'; return; }
      if(!state.mediaActive){
        if(!confirm("The GPU isn't in MEDIA mode. Switch now (this stops the running LLM) and generate?")) return;
        hint.textContent='switching to MEDIA…';
        try{ await fetch('/api/mode/media',{method:'POST'}); }catch{}
        if(!await waitForMedia(90)){ hint.textContent='still switching to MEDIA — click Generate again in a moment'; return; }
      }
      hint.textContent='submitting…';
      try {
        const seedVal = document.getElementById('seed').value.trim();
        const body = Object.assign({ prompt, kind:state.kind, count: parseInt(document.getElementById('count').value)||1 }, state.mods);
        if (seedVal!=='') body.seed = parseInt(seedVal);
        const asp = document.getElementById('aspect').value; if (asp) body.aspect = asp;
        if (state.initImage) body.initImage = state.initImage;
        if (state.kind==='edit' && state.initImage && _maskDrawn) body.maskImage = document.getElementById('maskcanvas').toDataURL('image/png');
        const r = await fetch('/api/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        if(!r.ok){ const e=await r.json().catch(()=>({})); hint.textContent = 'error: '+(e.error||r.status); return; }
        hint.textContent=''; pollJobs();
      } catch(e){ hint.textContent='request failed'; }
    }
    function mediaEl(j){
      if(!j.mediaUrl) return '<div class="spinner"></div>';
      if(j.kind==='music') return `<audio controls src="${j.mediaUrl}" style="width:90%"></audio>`;
      if(VIDEO.has(j.kind)) return `<video controls src="${j.mediaUrl}"></video>`;
      return `<img src="${j.mediaUrl}" alt=""/>`;
    }
    function waitForMedia(maxSec){ return new Promise(res=>{ let n=0; const t=setInterval(()=>{ if(state.mediaActive){clearInterval(t);res(true);} else if(++n>=maxSec){clearInterval(t);res(false);} },1000); }); }
    async function cancelJob(id){ try{ await fetch('/api/jobs/'+id+'/cancel',{method:'POST'}); }catch{} pollJobs(); }
    async function rerunJob(p,kind){ try{ await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:decodeURIComponent(p),kind})}); }catch{} pollJobs(); }
    function jobCard(j){
      const pct = Math.round((j.progress||0)*100);
      let inner;
      if (j.status==='done') inner = mediaEl(j);
      else if (j.status==='failed') inner = '<span style="color:var(--danger);font-size:26px">!</span>';
      else if (j.status==='running' && j.preview) inner = `<img src="${j.preview}" alt=""/>`;
      else inner = '<div class="spinner"></div>';
      const bar = j.status==='running' ? `<div class="pbar"><div style="width:${pct}%"></div></div>` : '';
      const cancel = (j.status==='running'||j.status==='queued') ? `<button class="xbtn" onclick="cancelJob('${j.id}')">cancel</button>` : '';
      const rerun = j.status==='done' ? `<button class="xbtn" onclick="rerunJob('${encodeURIComponent(j.prompt)}','${j.kind}')">↻ rerun</button>` : '';
      const sub = j.status==='failed' ? esc(j.message||'failed') : (j.status==='running' ? pct+'%' : j.status);
      return `<div class="card"><div class="media">${inner}</div>${bar}<div class="body">
        <div class="p">${esc(j.prompt)}</div>
        <div class="row" style="justify-content:space-between"><span class="s ${j.status}">${j.kind} · ${esc(sub)}</span><span>${rerun}${cancel}</span></div></div></div>`;
    }
    async function pollJobs(){
      try {
        const jobs = await (await fetch('/api/jobs')).json();
        const g = document.getElementById('results');
        if(!jobs.length){ g.innerHTML='<p class="hint">Nothing generated yet.</p>'; return; }
        g.innerHTML=''; jobs.forEach(j => g.appendChild($(jobCard(j))));
      } catch(e){}
    }
    function libCard(it){
      const m = it.kind==='music' ? `<audio controls src="${it.mediaUrl}" style="width:90%"></audio>`
        : (VIDEO.has(it.kind) ? `<video controls src="${it.mediaUrl}"></video>` : `<img src="${it.mediaUrl}" alt=""/>`);
      const p = esc(it.prompt) || '<span class="hint">(no prompt)</span>';
      return `<div class="card"><div class="media">${m}</div><div class="body"><div class="p">${p}</div>
        <div class="row" style="justify-content:space-between;margin-top:6px"><span class="s done">${it.kind}</span><span>
        <button class="xbtn" onclick="remixItem('${encodeURIComponent(it.prompt)}','${it.kind}')">remix</button>
        <a class="xbtn" href="${it.mediaUrl}" download style="text-decoration:none">save</a>
        <button class="xbtn" onclick="delItem('${encodeURIComponent(it.name)}')">del</button></span></div></div></div>`;
    }
    async function loadLibrary(){
      try {
        const items = await (await fetch('/api/gallery')).json();
        const g = document.getElementById('library');
        g.innerHTML = items.length ? '' : '<p class="hint">No saved generations yet.</p>';
        items.forEach(it => g.appendChild($(libCard(it))));
      } catch(e){ document.getElementById('library').innerHTML='<p class="err">could not load the library</p>'; }
    }
    async function delItem(name){ try{ await fetch('/api/gallery/'+name,{method:'DELETE'}); }catch{} loadLibrary(); }
    function remixItem(p,kind){ document.getElementById('prompt').value = decodeURIComponent(p); state.kind = kind; renderControls(); setView('create'); document.getElementById('prompt').focus(); }
    let modelsTimer=null;
    function modelRow(m){
      const status = m.installed ? '<span class="s done">installed</span>'
        : m.downloading ? `<span class="s running">downloading ${Math.round(m.progress*100)}%</span>`
        : m.error ? `<span class="s failed">failed: ${esc(m.error)}</span>`
        : '<span class="hint">not installed</span>';
      const btn = m.installed ? `<button class="xbtn" onclick="delModel('${m.id}')">remove</button>`
        : m.downloading ? '' : `<button class="xbtn" onclick="installModel('${m.id}')">install</button>`;
      return `<div class="scard"><div class="row" style="justify-content:space-between"><span>${esc(m.name)}${m.isDefault?' <span class="hint">· default</span>':''}</span>${btn}</div>
        <div class="hint" style="margin-top:5px;font-family:monospace">~${m.sizeGb} GB · ${m.tier} · ${status}</div></div>`;
    }
    async function loadModels(){
      try {
        const models = await (await fetch('/api/models')).json();
        const el = document.getElementById('models'); el.innerHTML='';
        for (const c of [...new Set(models.map(m=>m.capability))]) {
          el.appendChild($(`<h2>${c}</h2>`));
          const g=$('<div class="scards"></div>');
          models.filter(m=>m.capability===c).forEach(m=>g.appendChild($(modelRow(m))));
          el.appendChild(g);
        }
        if (models.some(m=>m.downloading) && state.view==='models' && !modelsTimer)
          modelsTimer = setTimeout(()=>{ modelsTimer=null; loadModels(); }, 2000);
      } catch(e){ document.getElementById('models').innerHTML='<p class="err">could not load models</p>'; }
    }
    async function installModel(id){ try{ await fetch('/api/models/'+id+'/install',{method:'POST'}); }catch{} loadModels(); }
    async function delModel(id){ if(!confirm('Remove this model file?')) return; try{ await fetch('/api/models/'+id,{method:'DELETE'}); }catch{} loadModels(); }
    function renderGuard(){
      const el = document.getElementById('guard');
      if(state.mediaActive){ el.innerHTML=''; return; }
      el.innerHTML='';
      const b = $(`<div class="banner"><span>The GPU isn't in MEDIA mode — generation needs it.</span><button class="ghost">Switch to MEDIA</button></div>`);
      b.querySelector('button').onclick = async()=>{ await fetch('/api/mode/media',{method:'POST'}); };
      el.appendChild(b);
    }
    function svcCard(s){
      const cls = !s.installed?'off':(s.running&&s.healthy?'ok':(s.running?'warn':'off'));
      const st = !s.installed?'not installed':(s.running?(s.healthy?'healthy':'starting…'):'stopped');
      const meta=[s.port?':'+s.port:null, s.vramGb?s.vramGb+' GB':null, s.model].filter(Boolean).join(' · ');
      return `<div class="scard"><div class="row" style="justify-content:space-between"><span><span class="dot ${cls}"></span>${esc(s.name)}</span><span class="hint">${st}</span></div><div class="hint" style="margin-top:5px;font-family:monospace">${esc(meta||s.desc||'')}</div></div>`;
    }
    async function pollStatus(){
      try {
        const r = await fetch('/api/status');
        const pill = document.getElementById('gpuPill');
        if(r.status===503){ state.mediaActive=false; renderGuard(); pill.textContent=''; document.getElementById('statusBody').innerHTML='<p class="hint">DokiDex home not found.</p>'; return; }
        const doc = await r.json(); const gpu=doc.gpu||{}; const active=gpu.activeGroup||'none';
        state.mediaActive = active==='media'; renderGuard();
        pill.innerHTML = `GPU <b>${active.toUpperCase()}</b> · ${Math.round((gpu.usedMB||0)/1024)}/${Math.round((gpu.totalMB||0)/1024)} GB`;
        // status view
        const modes=document.getElementById('modes'); modes.innerHTML='';
        [['agent','chat + code'],['coexist','+ autocomplete'],['media','image + video']].forEach(([m,sub])=>{
          const on = active===m || (m==='agent'&&active==='llm');
          const b=$(`<button class="mode ${on?'active':''}"><span>${m.toUpperCase()}</span><small>${sub}</small></button>`);
          b.onclick=()=>fetch('/api/mode/'+m,{method:'POST'}); modes.appendChild(b);
        });
        const body=document.getElementById('statusBody'); body.innerHTML='';
        const llm=(doc.services||[]).filter(s=>s.group!=='media'), media=(doc.services||[]).filter(s=>s.group==='media');
        if(llm.length){ body.appendChild($('<h2>LLM group</h2>')); const g=$('<div class="scards"></div>'); llm.forEach(s=>g.appendChild($(svcCard(s)))); body.appendChild(g); }
        if(media.length){ body.appendChild($('<h2>Media group</h2>')); const g=$('<div class="scards"></div>'); media.forEach(s=>g.appendChild($(svcCard(s)))); body.appendChild(g); }
      } catch(e){}
    }
    document.getElementById('prompt').addEventListener('keydown', e => { if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); generate(); } });
    document.getElementById('initfile').addEventListener('change', e => {
      const f = e.target.files[0]; const nm = document.getElementById('initname');
      if(!f){ state.initImage=null; nm.textContent=''; updateMaskBox(); return; }
      const rd = new FileReader(); rd.onload = () => { state.initImage = rd.result; nm.textContent = f.name + '  ✕'; updateMaskBox(); }; rd.readAsDataURL(f);
    });
    document.getElementById('initname').addEventListener('click', () => { state.initImage=null; document.getElementById('initfile').value=''; document.getElementById('initname').textContent=''; updateMaskBox(); });
    (function(){
      const cv = document.getElementById('maskcanvas');
      const at = e => { const r=cv.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; };
      const dot = (x,y) => { const c=cv.getContext('2d'); c.fillStyle='#fff'; c.beginPath(); c.arc(x,y,14,0,7); c.fill(); _maskDrawn=true; };
      cv.addEventListener('mousedown', e => { _maskDrawing=true; const [x,y]=at(e); dot(x,y); });
      cv.addEventListener('mousemove', e => { if(_maskDrawing){ const [x,y]=at(e); dot(x,y); } });
      window.addEventListener('mouseup', () => { _maskDrawing=false; });
    })();
    renderControls(); document.getElementById('prompt').focus();
    pollStatus(); setInterval(pollStatus, 2000);
    pollJobs(); setInterval(pollJobs, 1500);
  </script>
</body>
</html>
